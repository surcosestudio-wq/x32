name: Build Surcos X32 Compatible

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout builder
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cpio curl gzip jq perl u-boot-tools xz-utils

      - name: Build compatible firmware
        env:
          BASE_TAG: beta-2026-06-09--5
        run: bash scripts/build_surcos_compatible.sh

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: Surcos-X32-EQ2404-Compatible
          path: |
            dist/Surcos-X32-EQ2404-Compatible.run
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
